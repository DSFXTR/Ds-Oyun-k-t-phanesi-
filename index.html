<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DSFX - Kafa Topu Pro Edition</title>
    <style>
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        canvas { background: linear-gradient(#4facfe 0%, #00f2fe 100%); border: 5px solid #fff; border-radius: 10px; margin-top: 20px; }
        .controls { margin-top: 10px; font-size: 18px; color: #ebd08c; }
        h1 { color: #ebd08c; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>DSFX KAFA TOPU</h1>
    <div class="controls">PC: A/D Hareket | W Zıpla</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Oyun Değişkenleri
        let score = 0;
        const gravity = 0.5;

        // Oyuncu Objesi
        const player = {
            x: 100, y: 300, width: 50, height: 70,
            dx: 0, dy: 0, speed: 5, jumpPower: -12, grounded: false
        };

        // Top Objesi
        const ball = {
            x: 400, y: 200, radius: 15,
            dx: 3, dy: 0, bounce: 0.7
        };

        // Tuş Kontrolleri
        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            // Hareket Kontrolü
            if (keys["KeyA"]) player.dx = -player.speed;
            else if (keys["KeyD"]) player.dx = player.speed;
            else player.dx = 0;

            if (keys["KeyW"] && player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }

            // Fizik Uygulama
            player.dy += gravity;
            player.x += player.dx;
            player.y += player.dy;

            ball.dy += gravity;
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Zemin Çarpışması
            if (player.y + player.height > canvas.height - 20) {
                player.y = canvas.height - 20 - player.height;
                player.dy = 0;
                player.grounded = true;
            }

            if (ball.y + ball.radius > canvas.height - 20) {
                ball.y = canvas.height - 20 - ball.radius;
                ball.dy *= -ball.bounce;
            }

            // Duvar ve Kale Çarpışması
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                if (ball.y > 250) { // Gol Bölgesi
                    score++;
                    resetBall();
                } else {
                    ball.dx *= -1;
                }
            }

            // Oyuncu ve Top Çarpışması
            let dist = Math.hypot(ball.x - (player.x + player.width/2), ball.y - (player.y + player.height/2));
            if (dist < 50) {
                ball.dx = (ball.x - (player.x + player.width/2)) * 0.2;
                ball.dy = -10;
            }

            draw();
            requestAnimationFrame(update);
        }

        function resetBall() {
            ball.x = 400; ball.y = 100; ball.dx = 3; ball.dy = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Çim
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

            // Kale (Sağ taraf)
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.strokeRect(canvas.width - 40, 250, 40, 130);

            // Oyuncu (Kafa Şeklinde)
            ctx.fillStyle = "#e67e22";
            ctx.beginPath();
            ctx.arc(player.x + 25, player.y + 25, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "blue";
            ctx.fillRect(player.x + 10, player.y + 50, 30, 20); // Vücut

            // Top
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "black";
            ctx.stroke();

            // Skor
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.fillText("Gol: " + score, 20, 40);
        }

        update();
    </script>
</body>
</html>
